services:
  - type: web
    name: audiokitoblaruzbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: STORAGE_CHANNEL_ID
        sync: false
